<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linear Regression Mastery</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- MathJax Configuration (MUST be before loading MathJax) -->
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            },
            svg: {
                fontCache: 'global'
            }
        };
    </script>
    
    <!-- Load MathJax -->
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: #f3f4f6;
        }
        /* Fade animation for steps */
        #app-content {
            animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* Table Styles */
        .table-header th {
            padding: 12px;
            background-color: #f1f5f9;
            color: #475569;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
            border-bottom: 2px solid #e2e8f0;
        }
        .table-row td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #e2e8f0;
            color: #334155;
        }
    </style>
</head>
<body class="text-gray-800 antialiased">

    <!-- Header -->
    <div class="bg-gradient-to-r from-indigo-700 to-purple-800 text-white p-6 shadow-lg">
        <div class="max-w-5xl mx-auto">
            <h1 class="text-3xl font-bold tracking-tight">Linear Regression Analysis</h1>
            <p class="text-indigo-100 mt-1 opacity-90">Step-by-Step Guide: Correlation & Least Squares Line</p>
        </div>
    </div>

    <!-- Main Container -->
    <div class="max-w-5xl mx-auto mt-8 px-4 pb-20">
        
        <!-- Progress Bar -->
        <div class="w-full bg-gray-200 rounded-full h-2 mb-8">
            <div id="progress-bar" class="bg-indigo-600 h-2 rounded-full transition-all duration-500 ease-out" style="width: 0%"></div>
        </div>

        <!-- Dynamic Content Card -->
        <div class="bg-white rounded-xl shadow-lg border border-gray-100 overflow-hidden min-h-[500px] flex flex-col">
            <div id="app-content" class="p-8 flex-grow">
                <!-- Javascript will inject content here -->
            </div>
            
            <!-- Navigation Footer inside Card -->
            <div class="bg-gray-50 px-8 py-4 border-t border-gray-100 flex justify-between items-center">
                <button id="btn-back" onclick="prevStep()" class="px-6 py-2.5 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 disabled:opacity-50 disabled:cursor-not-allowed font-semibold transition shadow-sm text-sm">
                    Back
                </button>
                <button id="btn-next" onclick="nextStep()" class="px-6 py-2.5 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 font-semibold transition shadow-md text-sm tracking-wide">
                    Next Step
                </button>
            </div>
        </div>
    </div>

    <script>
        // --- Data Definitions ---

        const rTableHTML = `
            <div class="overflow-hidden border border-gray-200 rounded-lg shadow-sm">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">Size of Correlation ($r$)</th>
                            <th class="px-6 py-3 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">Interpretation</th>
                        </tr>
                    </thead>
                    <tbody class="bg-white divide-y divide-gray-200 text-sm">
                        <tr><td class="px-6 py-3 font-mono text-gray-600">.90 to 1.00 (-.90 to -1.00)</td><td class="px-6 py-3 font-bold text-green-700">Very high positive (negative) correlation</td></tr>
                        <tr><td class="px-6 py-3 font-mono text-gray-600">.70 to .90 (-.70 to -.90)</td><td class="px-6 py-3 font-bold text-blue-700">High positive (negative) correlation</td></tr>
                        <tr><td class="px-6 py-3 font-mono text-gray-600">.50 to .70 (-.50 to -.70)</td><td class="px-6 py-3 font-bold text-yellow-600">Moderate positive (negative) correlation</td></tr>
                        <tr><td class="px-6 py-3 font-mono text-gray-600">.30 to .50 (-.30 to -.50)</td><td class="px-6 py-3 font-bold text-orange-600">Low positive (negative) correlation</td></tr>
                        <tr><td class="px-6 py-3 font-mono text-gray-600">.00 to .30 (.00 to -.30)</td><td class="px-6 py-3 text-gray-500">Negligible correlation</td></tr>
                    </tbody>
                </table>
            </div>
        `;

        // Example 1: Height (cm) vs Weight (kg) -> High Positive
        const scenario1 = {
            id: 1,
            title: "Example 1: Height vs. Weight",
            xName: "Height", xUnit: "cm", xSym: "x",
            yName: "Weight", yUnit: "kg", ySym: "y",
            data: [
                {x: 150, y: 45},
                {x: 155, y: 52},
                {x: 160, y: 54},
                {x: 165, y: 53},
                {x: 170, y: 60}
            ]
        };

        // Example 2: Sleep (hrs) vs Followers -> Moderate Negative
        const scenario2 = {
            id: 2,
            title: "Example 2: Sleep vs. Followers",
            xName: "Hours of Sleep", xUnit: "hrs", xSym: "x",
            yName: "Followers", yUnit: "", ySym: "y",
            data: [
                {x: 4, y: 1200},
                {x: 5, y: 950},
                {x: 6, y: 1100}, // Outlier creates 'moderate' noise
                {x: 7, y: 700},
                {x: 8, y: 500}
            ]
        };

        const scenarios = [scenario1, scenario2];
        let globalStep = 0; // Tracks overall progress
        let chartInstance = null;

        // --- Math Logic ---
        function calculateStats(data) {
            let n = data.length;
            let sumX = 0, sumY = 0, sumXY = 0, sumX2 = 0, sumY2 = 0;

            data.forEach(p => {
                sumX += p.x;
                sumY += p.y;
                sumXY += (p.x * p.y);
                sumX2 += (p.x * p.x);
                sumY2 += (p.y * p.y);
            });

            // Means
            let meanX = sumX / n;
            let meanY = sumY / n;

            // Correlation (r)
            // Using sum formula to ensure accuracy matching the table
            let numerR = (n * sumXY) - (sumX * sumY);
            let denomR = Math.sqrt(((n * sumX2) - Math.pow(sumX,2)) * ((n * sumY2) - Math.pow(sumY,2)));
            let r = numerR / denomR;

            // Standard Deviations (Sample)
            // sx = sqrt( (sumX2 - (sumX^2)/n) / (n-1) )
            let ssX = sumX2 - (Math.pow(sumX, 2) / n);
            let ssY = sumY2 - (Math.pow(sumY, 2) / n);
            let sx = Math.sqrt(ssX / (n - 1));
            let sy = Math.sqrt(ssY / (n - 1));

            // Slope (B) using the requested formula: B = r * (sy / sx)
            let B = r * (sy / sx);

            // Intercept (A) using the requested formula: A = meanY - B * meanX
            let A = meanY - (B * meanX);

            return { n, sumX, sumY, sumXY, sumX2, sumY2, meanX, meanY, sx, sy, r, A, B };
        }

        // --- Render Functions ---

        function renderIntro() {
            return `
                <div class="max-w-3xl mx-auto">
                    <h2 class="text-3xl font-bold mb-6 text-indigo-900">Welcome to Linear Regression</h2>
                    <p class="mb-4 text-lg text-gray-600">In this interactive lesson, we will learn how to find the relationship between two variables using the equation:</p>
                    <div class="bg-indigo-50 p-6 rounded-lg border-l-4 border-indigo-500 mb-8 text-center">
                        <span class="text-2xl font-bold text-indigo-800">$$y = A + Bx$$</span>
                    </div>
                    <p class="mb-6 text-gray-600">We will analyze two real-world examples to:</p>
                    <ul class="list-disc pl-6 mb-8 space-y-2 text-gray-700">
                        <li>Calculate the <strong>Pearson Correlation Coefficient ($r$)</strong>.</li>
                        <li>Interpret the strength and direction of the relationship.</li>
                        <li>Calculate the <strong>Least Squares Regression Line</strong> using standard deviations.</li>
                    </ul>
                    <div class="mt-8">
                        <h3 class="font-bold text-lg mb-3 text-gray-800">Correlation Reference Table</h3>
                        ${rTableHTML}
                    </div>
                </div>
            `;
        }

        function renderDataTable(sc) {
            let rows = sc.data.map(d => `<tr class="table-row"><td>${d.x}</td><td>${d.y}</td></tr>`).join('');
            return `
                <h2 class="text-2xl font-bold mb-2 text-indigo-900">${sc.title}</h2>
                <p class="mb-6 text-gray-600">We start with a set of collected data points.</p>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                    <div class="md:col-span-1">
                        <div class="overflow-hidden border border-gray-200 rounded-lg shadow-sm">
                            <table class="min-w-full">
                                <thead class="table-header"><tr><th>$x$ (${sc.xName})</th><th>$y$ (${sc.yName})</th></tr></thead>
                                <tbody class="bg-white">${rows}</tbody>
                            </table>
                        </div>
                    </div>
                    <div class="md:col-span-2 flex flex-col justify-center bg-gray-50 rounded-lg p-6 border border-gray-100">
                        <p class="font-semibold text-gray-700 mb-2">Variables:</p>
                        <ul class="space-y-3">
                            <li class="flex items-center"><span class="w-8 h-8 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center font-bold mr-3">x</span> <span><strong>Independent Variable:</strong> ${sc.xName}</span></li>
                            <li class="flex items-center"><span class="w-8 h-8 rounded-full bg-pink-100 text-pink-600 flex items-center justify-center font-bold mr-3">y</span> <span><strong>Dependent Variable:</strong> ${sc.yName}</span></li>
                        </ul>
                    </div>
                </div>
            `;
        }

        function renderGraph(sc, showLine) {
            return `
                <h2 class="text-2xl font-bold mb-2 text-indigo-900">${showLine ? "Regression Line" : "Scatter Plot"}</h2>
                <p class="mb-6 text-gray-600">${showLine ? "The Least Squares Regression Line is the line that minimizes the vertical distance between the data points and the line." : "First, let's plot these points on a Cartesian coordinate system to see if there is a pattern."}</p>
                <div class="relative h-[400px] w-full bg-white border border-gray-200 rounded-lg shadow-inner p-2">
                    <canvas id="chartCanvas"></canvas>
                </div>
            `;
        }

        function renderSummations(sc) {
            const s = calculateStats(sc.data);
            let rows = sc.data.map(d => `
                <tr class="table-row">
                    <td>${d.x}</td>
                    <td>${d.y}</td>
                    <td>${d.x * d.y}</td>
                    <td>${d.x * d.x}</td>
                    <td>${d.y * d.y}</td>
                </tr>
            `).join('');

            return `
                <h2 class="text-2xl font-bold mb-4 text-indigo-900">Step 3: Calculating Summations</h2>
                <p class="mb-6 text-gray-600">To use the formulas, we first need to calculate the sum of each column.</p>
                <div class="overflow-x-auto border border-gray-200 rounded-lg shadow-sm">
                    <table class="min-w-full">
                        <thead class="table-header">
                            <tr>
                                <th>$x$</th>
                                <th>$y$</th>
                                <th>$x \\cdot y$</th>
                                <th>$x^2$</th>
                                <th>$y^2$</th>
                            </tr>
                        </thead>
                        <tbody class="bg-white">${rows}</tbody>
                        <tfoot class="font-bold text-sm">
                            <tr>
                                <td class="py-4 px-2 text-center bg-blue-100 text-blue-900">$\\sum x = ${s.sumX}$</td>
                                <td class="py-4 px-2 text-center bg-blue-100 text-blue-900">$\\sum y = ${s.sumY}$</td>
                                <td class="py-4 px-2 text-center bg-blue-200 text-blue-900">$\\sum xy = ${s.sumXY}$</td>
                                <td class="py-4 px-2 text-center bg-green-100 text-green-900">$\\sum x^2 = ${s.sumX2}$</td>
                                <td class="py-4 px-2 text-center bg-orange-100 text-orange-900">$\\sum y^2 = ${s.sumY2}$</td>
                            </tr>
                        </tfoot>
                    </table>
                </div>
            `;
        }

        function renderCorrelation(sc) {
            const s = calculateStats(sc.data);
            return `
                <h2 class="text-2xl font-bold mb-4 text-indigo-900">Step 4: Pearson's Correlation ($r$)</h2>
                <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm">
                    <p class="mb-4 text-gray-600">The correlation coefficient tells us the strength and direction of the linear relationship.</p>
                    <div class="overflow-x-auto bg-yellow-50 p-6 rounded-lg border border-yellow-200">
                        $$r = \\frac{n(\\sum xy) - (\\sum x)(\\sum y)}{\\sqrt{[n(\\sum x^2) - (\\sum x)^2][n(\\sum y^2) - (\\sum y)^2]}}$$
                        <div class="mt-4 pt-4 border-t border-yellow-200 border-dashed text-sm">
                            $$r = \\frac{${s.n}(${s.sumXY}) - (${s.sumX})(${s.sumY})}{\\sqrt{[${s.n}(${s.sumX2}) - (${s.sumX})^2][${s.n}(${s.sumY2}) - (${s.sumY})^2]}}$$
                        </div>
                    </div>
                    <div class="mt-6 text-center">
                         <div class="inline-block p-4 bg-indigo-600 text-white rounded-lg shadow-md">
                            <span class="text-lg font-medium mr-2">Result:</span>
                            <span class="text-3xl font-bold">r = ${s.r.toFixed(4)}</span>
                         </div>
                    </div>
                </div>
            `;
        }

        function renderInterpretationR(sc) {
            const r = calculateStats(sc.data).r;
            let interpretation = "";
            let colorClass = "";

            if (Math.abs(r) >= 0.9) { interpretation = "Very high"; colorClass = "text-green-600"; }
            else if (Math.abs(r) >= 0.7) { interpretation = "High"; colorClass = "text-blue-600"; }
            else if (Math.abs(r) >= 0.5) { interpretation = "Moderate"; colorClass = "text-yellow-600"; }
            else if (Math.abs(r) >= 0.3) { interpretation = "Low"; colorClass = "text-orange-600"; }
            else { interpretation = "Negligible"; colorClass = "text-gray-500"; }

            interpretation += r > 0 ? " positive" : " negative";
            interpretation += " correlation";

            return `
                <h2 class="text-2xl font-bold mb-6 text-indigo-900">Step 5: Interpreting Correlation</h2>
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    <div>
                        <h4 class="font-bold text-gray-500 uppercase text-xs mb-2">Reference Table</h4>
                        ${rTableHTML}
                    </div>
                    <div class="flex flex-col justify-center items-center bg-gray-50 rounded-xl p-8 border border-gray-100 shadow-sm text-center">
                        <p class="text-gray-500 uppercase tracking-widest text-xs font-bold mb-2">Calculated r</p>
                        <h3 class="text-4xl font-black text-gray-800 mb-6">${r.toFixed(4)}</h3>
                        
                        <div class="w-full h-px bg-gray-300 mb-6"></div>
                        
                        <p class="text-gray-500 uppercase tracking-widest text-xs font-bold mb-2">Interpretation</p>
                        <h3 class="text-2xl font-bold ${colorClass}">${interpretation}</h3>
                    </div>
                </div>
            `;
        }

        function renderEquationNew(sc) {
            const s = calculateStats(sc.data);
            return `
                <h2 class="text-2xl font-bold mb-4 text-indigo-900">Step 6: Finding the Equation</h2>
                
                <!-- Stats Summary -->
                <div class="mb-6 grid grid-cols-2 md:grid-cols-4 gap-4 text-center">
                    <div class="bg-gray-100 p-3 rounded">$\\bar{x} = ${s.meanX.toFixed(2)}$</div>
                    <div class="bg-gray-100 p-3 rounded">$\\bar{y} = ${s.meanY.toFixed(2)}$</div>
                    <div class="bg-gray-100 p-3 rounded">$s_x = ${s.sx.toFixed(4)}$</div>
                    <div class="bg-gray-100 p-3 rounded">$s_y = ${s.sy.toFixed(4)}$</div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <!-- Slope B -->
                    <div class="bg-white border border-gray-200 rounded-xl shadow-sm p-6">
                        <div class="flex items-center mb-4">
                            <div class="w-8 h-8 rounded bg-blue-600 text-white flex items-center justify-center font-bold mr-3">1</div>
                            <h3 class="font-bold text-gray-800">Calculate Slope ($B$)</h3>
                        </div>
                        <div class="overflow-x-auto">
                            $$B = r \\left(\\frac{s_y}{s_x}\\right)$$
                            <div class="my-4 pt-4 border-t border-dashed">
                                $$B = ${s.r.toFixed(4)} \\left(\\frac{${s.sy.toFixed(4)}}{${s.sx.toFixed(4)}}\\right)$$
                            </div>
                            <div class="p-3 bg-blue-50 rounded text-center text-blue-800 font-bold border border-blue-100">
                                $$B \\approx ${s.B.toFixed(4)}$$
                            </div>
                        </div>
                    </div>

                    <!-- Intercept A -->
                    <div class="bg-white border border-gray-200 rounded-xl shadow-sm p-6">
                        <div class="flex items-center mb-4">
                            <div class="w-8 h-8 rounded bg-green-600 text-white flex items-center justify-center font-bold mr-3">2</div>
                            <h3 class="font-bold text-gray-800">Calculate Intercept ($A$)</h3>
                        </div>
                        <div class="overflow-x-auto">
                            $$A = \\bar{y} - B\\bar{x}$$
                            <div class="my-4 pt-4 border-t border-dashed">
                                $$A = ${s.meanY.toFixed(4)} - (${s.B.toFixed(4)})(${s.meanX.toFixed(4)})$$
                            </div>
                            <div class="p-3 bg-green-50 rounded text-center text-green-800 font-bold border border-green-100">
                                $$A \\approx ${s.A.toFixed(4)}$$
                            </div>
                        </div>
                    </div>
                </div>

                <div class="mt-8 text-center">
                    <p class="text-gray-500 mb-2 font-medium uppercase tracking-wide text-sm">Final Equation</p>
                    <div class="inline-block bg-gradient-to-r from-gray-800 to-gray-900 text-white px-10 py-4 rounded-lg shadow-lg transform hover:scale-105 transition-transform">
                        <span class="text-3xl font-bold font-mono">y = ${s.A.toFixed(2)} + ${s.B.toFixed(2)}x</span>
                    </div>
                </div>
            `;
        }

        function renderInterpretationB(sc, isLast) {
            const s = calculateStats(sc.data);
            const direction = s.B > 0 ? "increase" : "decrease";
            const color = s.B > 0 ? "text-green-600" : "text-red-600";
            
            return `
                <h2 class="text-2xl font-bold mb-4 text-indigo-900">Step 8: Interpreting the Slope ($B$)</h2>
                <div class="bg-white p-8 rounded-xl shadow-md border-l-8 border-indigo-500">
                    <p class="text-lg text-gray-700 leading-relaxed">
                        The slope represents the rate of change.
                        <br><br>
                        For every <strong>1 ${sc.xUnit}</strong> increase in <strong>${sc.xName}</strong>, 
                        there is an estimated <strong class="${color} text-xl">${direction}</strong> of <strong>${Math.abs(s.B).toFixed(2)} ${sc.yUnit}</strong> in <strong>${sc.yName}</strong>.
                    </p>
                </div>
                ${!isLast ? `<div class="mt-10 text-center bg-indigo-50 p-6 rounded-lg"><p class="text-indigo-900 font-medium">Great job! Click Next to proceed to the second example.</p></div>` : ''}
            `;
        }

        // --- Core Logic ---

        function updateUI() {
            const container = document.getElementById('app-content');
            let content = "";
            let drawChart = false;
            let drawLine = false;
            let currentSc = null;

            // Step mapping
            // 0: Intro
            // Example 1 Steps:
            // 1. Data Table
            // 2. Scatter Plot
            // 3. Summations
            // 4. Calc Correlation (r)
            // 5. Interpret r
            // 6. Calc Equation (A & B)
            // 7. Graph Line
            // 8. Interpret Slope
            
            const stepsPerScenario = 8;

            if (globalStep === 0) {
                content = renderIntro();
                document.getElementById('btn-back').disabled = true;
                document.getElementById('btn-next').innerText = "Start Example 1";
            } else {
                document.getElementById('btn-back').disabled = false;
                
                let adjustedStep = globalStep - 1;
                let scenarioIndex = Math.floor(adjustedStep / stepsPerScenario);
                
                if (scenarioIndex >= scenarios.length) {
                    // Finished
                    container.innerHTML = `
                        <div class="text-center py-16">
                            <div class="mb-6 text-6xl">🎉</div>
                            <h1 class="text-4xl font-bold text-indigo-900 mb-4">Lesson Complete!</h1>
                            <p class="text-gray-600 text-lg mb-10">You have successfully mastered the basics of Linear Regression.</p>
                            <button onclick="location.reload()" class="bg-indigo-600 text-white px-10 py-4 rounded-full hover:bg-indigo-700 shadow-xl font-bold transition transform hover:-translate-y-1">Start Over</button>
                        </div>
                    `;
                    document.getElementById('btn-next').style.display = 'none';
                    document.getElementById('btn-back').style.display = 'none';
                    document.getElementById('progress-bar').style.width = '100%';
                    return;
                }

                currentSc = scenarios[scenarioIndex];
                let subStep = adjustedStep % stepsPerScenario;
                
                document.getElementById('btn-next').innerText = "Next Step";

                switch(subStep) {
                    case 0: content = renderDataTable(currentSc); break;
                    case 1: content = renderGraph(currentSc, false); drawChart = true; break;
                    case 2: content = renderSummations(currentSc); break;
                    case 3: content = renderCorrelation(currentSc); break;
                    case 4: content = renderInterpretationR(currentSc); break;
                    case 5: content = renderEquationNew(currentSc); break;
                    case 6: content = renderGraph(currentSc, true); drawChart = true; drawLine = true; break;
                    case 7: 
                        content = renderInterpretationB(currentSc, scenarioIndex === scenarios.length - 1); 
                        if (scenarioIndex < scenarios.length - 1) document.getElementById('btn-next').innerText = "Start Example 2";
                        else document.getElementById('btn-next').innerText = "Finish Lesson";
                        break;
                }
            }

            // Remove animation class to reset it
            container.classList.remove('fade-in');
            void container.offsetWidth; // trigger reflow
            container.innerHTML = content;
            
            // Progress
            let totalSteps = 1 + (scenarios.length * stepsPerScenario);
            let pct = (globalStep / totalSteps) * 100;
            document.getElementById('progress-bar').style.width = `${pct}%`;

            // Run MathJax
            if (window.MathJax) {
                // We use typesetPromise to ensure it runs after DOM update
                MathJax.typesetPromise([container]).catch((err) => console.log(err));
            }

            // Run Chart
            if (drawChart && currentSc) {
                setTimeout(() => initChart(currentSc, drawLine), 50); // slight delay to ensure canvas is ready
            }
        }

        function nextStep() {
            globalStep++;
            updateUI();
        }

        function prevStep() {
            if (globalStep > 0) {
                globalStep--;
                updateUI();
            }
        }

        function initChart(sc, showLine) {
            const ctx = document.getElementById('chartCanvas');
            if (!ctx) return;
            
            if (chartInstance) chartInstance.destroy();

            const s = calculateStats(sc.data);
            const dataPoints = sc.data.map(p => ({x: p.x, y: p.y}));
            
            // Generate line points
            const allX = sc.data.map(p => p.x);
            const minX = Math.min(...allX) - 1;
            const maxX = Math.max(...allX) + 1;
            
            const linePoints = [
                {x: minX, y: s.A + s.B * minX},
                {x: maxX, y: s.A + s.B * maxX}
            ];

            const datasets = [{
                label: 'Observed Data',
                data: dataPoints,
                backgroundColor: 'rgba(79, 70, 229, 0.8)',
                borderColor: 'rgba(79, 70, 229, 1)',
                borderWidth: 1,
                pointRadius: 6,
                pointHoverRadius: 8,
                type: 'scatter'
            }];

            if (showLine) {
                datasets.push({
                    label: `Regression Line (y = ${s.A.toFixed(2)} + ${s.B.toFixed(2)}x)`,
                    data: linePoints,
                    borderColor: '#db2777', // Pink-600
                    borderWidth: 3,
                    type: 'line',
                    fill: false,
                    pointRadius: 0,
                    tension: 0
                });
            }

            chartInstance = new Chart(ctx, {
                type: 'scatter',
                data: { datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: {
                            type: 'linear',
                            position: 'bottom',
                            title: { display: true, text: `${sc.xName} (${sc.xUnit})`, font: {weight:'bold'} },
                            grid: { color: '#f3f4f6' }
                        },
                        y: {
                            title: { display: true, text: `${sc.yName} ${sc.yUnit}`, font: {weight:'bold'} },
                            grid: { color: '#f3f4f6' }
                        }
                    },
                    plugins: {
                        legend: { position: 'top' },
                        tooltip: {
                            callbacks: {
                                label: (ctx) => `(${ctx.parsed.x}, ${ctx.parsed.y})`
                            }
                        }
                    }
                }
            });
        }

        // Initialize
        updateUI();

    </script>
</body>
</html>
